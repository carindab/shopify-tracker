<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shopify Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0b0b0f; --card:#16161c; --card-2:#1e1e26; --border:#2a2a35;
    --text:#f3f3f5; --muted:#8a8a99; --faint:#5a5a68;
    --purple:#a78bfa; --pink:#f472b6; --green:#34d399; --blue:#60a5fa; --amber:#fbbf24;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:48px 20px 80px; line-height:1.5; }
  .wrap { max-width:880px; margin:0 auto; }

  header { margin-bottom:28px; }
  h1 { font-size:30px; font-weight:800; letter-spacing:-0.5px; background:linear-gradient(120deg,var(--purple),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  header p { color:var(--muted); font-size:15px; margin-top:4px; }
  .status { display:inline-flex; align-items:center; gap:8px; background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:var(--green); font-size:13px; font-weight:500; padding:7px 14px; border-radius:999px; margin-top:16px; }
  .status .dot { width:7px; height:7px; border-radius:50%; background:var(--green); }

  .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .toolbar h2 { font-size:18px; font-weight:700; }
  .toolbar .spacer { flex:1; }

  .btn { background:linear-gradient(120deg,var(--purple),var(--pink)); border:none; border-radius:11px; color:#fff; font-size:14px; font-weight:700; padding:11px 18px; cursor:pointer; transition:opacity .15s,transform .05s; }
  .btn:hover { opacity:.9; } .btn:active { transform:scale(.99); }
  .btn.ghost { background:var(--card-2); border:1px solid var(--border); color:var(--text); }
  .btn.sm { padding:8px 13px; font-size:13px; }

  /* PROJECT CARD */
  .project { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:18px; }
  .project-head { display:flex; align-items:flex-start; gap:12px; margin-bottom:18px; }
  .project-head .pname { font-size:18px; font-weight:700; }
  .project-head .ppath { font-size:12px; color:var(--faint); font-family:ui-monospace,monospace; margin-top:3px; word-break:break-all; }
  .project-head .actions { margin-left:auto; display:flex; gap:8px; flex-shrink:0; }
  .icon-btn { background:none; border:none; color:var(--faint); cursor:pointer; font-size:14px; padding:4px; }
  .icon-btn:hover { color:var(--text); }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media (max-width:680px){ .stats { grid-template-columns:repeat(2,1fr); } }
  .stat { background:var(--card-2); border:1px solid var(--border); border-radius:14px; padding:18px 14px; text-align:center; }
  .stat .lbl { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.5px; margin-bottom:9px; font-weight:600; }
  .stat .num { font-size:32px; font-weight:800; line-height:1; letter-spacing:-1px; }
  .stat .sub { font-size:11px; color:var(--faint); margin-top:7px; }
  .stat.p .num{color:var(--purple)} .stat.b .num{color:var(--blue)} .stat.k .num{color:var(--pink)} .stat.g .num{color:var(--green)}

  .project-foot { display:flex; align-items:center; gap:10px; margin-top:16px; font-size:12px; color:var(--faint); }
  .period-sel { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12px; padding:6px 10px; cursor:pointer; }

  .empty { background:var(--card); border:1px dashed var(--border); border-radius:18px; padding:48px 24px; text-align:center; color:var(--muted); }
  .empty .big { font-size:40px; margin-bottom:12px; }

  /* MODAL */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; align-items:center; justify-content:center; padding:20px; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:28px; width:100%; max-width:460px; }
  .modal h3 { font-size:18px; font-weight:700; margin-bottom:6px; }
  .modal .desc { font-size:13px; color:var(--muted); margin-bottom:20px; }
  .field { margin-bottom:16px; }
  label { display:block; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:7px; }
  label .opt { color:var(--faint); font-weight:400; text-transform:none; }
  input[type=text] { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:11px; color:var(--text); font-size:14px; padding:12px 14px; outline:none; transition:border-color .15s,box-shadow .15s; }
  input[type=text]:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(167,139,250,.15); }
  .modal-actions { display:flex; gap:10px; margin-top:22px; }
  .modal-actions .btn { flex:1; }

  .sources { margin-top:16px; border-top:1px solid var(--border); padding-top:16px; }
  .src-title { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:11px; }
  .src-list { display:flex; flex-wrap:wrap; gap:8px; }
  .src-chip { display:flex; align-items:center; gap:9px; background:var(--card-2); border:1px solid var(--border); border-radius:10px; padding:8px 13px; font-size:13px; color:var(--muted); }
  .src-chip b { color:var(--text); font-weight:700; background:var(--bg); border-radius:6px; padding:2px 8px; }

  .loading { color:var(--muted); font-size:13px; text-align:center; padding:8px; }
  footer { text-align:center; color:var(--faint); font-size:12px; margin-top:36px; }
  .link-btn { background:none; border:none; color:var(--faint); font-size:12px; cursor:pointer; text-decoration:underline; padding:0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Shopify Tracker</h1>
    <p>Bezoekers & button clicks per project</p>
    <div class="status"><span class="dot"></span> Verbonden met database</div>
  </header>

  <div class="toolbar">
    <h2>Mijn projecten</h2>
    <div class="spacer"></div>
    <button class="btn" onclick="openModal()">+ Nieuw project</button>
  </div>

  <div id="projects"></div>

  <footer>
    Tip: klik op het 🔄 om de cijfers te verversen ·
    <button class="link-btn" onclick="resetSettings()">database-instellingen</button>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Nieuw project</h3>
    <p class="desc">Geef het project een naam, de pagina die je wilt meten, en de knop-bestemming (waar de knop naartoe linkt).</p>
    <input type="hidden" id="editId" />
    <div class="field">
      <label>Projectnaam</label>
      <input type="text" id="mName" placeholder="bijv. Renewal" />
    </div>
    <div class="field">
      <label>Landingspagina <span class="opt">— de pagina waarvan je bezoekers wilt tellen</span></label>
      <input type="text" id="mLanding" placeholder="https://gloweorganics.com/pages/renewal" />
    </div>
    <div class="field">
      <label>Knop-bestemming <span class="opt">— waar de knop naartoe linkt</span></label>
      <input type="text" id="mProduct" placeholder="https://gloweorganics.com/products/bakuchiol-renewal-oil" />
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn" onclick="saveProject()">Opslaan</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_URL = "https://stjhekmudgjizcftmxrp.supabase.co";
  const DEFAULT_KEY = "sb_publishable_fAHCzmPocfgNplqEVKC-tQ_Asuk-Z1w";
  function cfg(){ return { url: localStorage.getItem("sb_url")||DEFAULT_URL, key: localStorage.getItem("sb_key")||DEFAULT_KEY }; }

  function resetSettings(){
    const url = prompt("Supabase URL:", cfg().url); if(url===null) return;
    const key = prompt("Supabase key:", cfg().key); if(key===null) return;
    localStorage.setItem("sb_url", url.trim()); localStorage.setItem("sb_key", key.trim());
    alert("Opgeslagen!"); renderAll();
  }

  // ── PROJECTS STORAGE ──
  function loadProjects(){ try { return JSON.parse(localStorage.getItem("tracker_projects")||"[]"); } catch { return []; } }
  function saveProjects(p){ localStorage.setItem("tracker_projects", JSON.stringify(p)); }

  function openModal(edit){
    document.getElementById("modalBg").classList.add("open");
    if(edit){
      document.getElementById("modalTitle").textContent = "Project bewerken";
      document.getElementById("editId").value = edit.id;
      document.getElementById("mName").value = edit.name;
      document.getElementById("mLanding").value = edit.landing;
      document.getElementById("mProduct").value = edit.product;
    } else {
      document.getElementById("modalTitle").textContent = "Nieuw project";
      document.getElementById("editId").value = "";
      document.getElementById("mName").value = "";
      document.getElementById("mLanding").value = "";
      document.getElementById("mProduct").value = "";
    }
  }
  function closeModal(){ document.getElementById("modalBg").classList.remove("open"); }

  function saveProject(){
    const name = document.getElementById("mName").value.trim();
    const landing = document.getElementById("mLanding").value.trim();
    const product = document.getElementById("mProduct").value.trim();
    if(!name || !landing){ alert("Vul minstens een naam en landingspagina in."); return; }
    const id = document.getElementById("editId").value;
    let projects = loadProjects();
    if(id){
      projects = projects.map(p => p.id===id ? {...p, name, landing, product} : p);
    } else {
      projects.push({ id: "p"+Date.now(), name, landing, product });
    }
    saveProjects(projects);
    closeModal();
    renderAll();
  }

  function editProject(id){ const p = loadProjects().find(x=>x.id===id); if(p) openModal(p); }
  function deleteProject(id){ if(confirm("Dit project verwijderen? (je data blijft bewaard)")){ saveProjects(loadProjects().filter(p=>p.id!==id)); renderAll(); } }

  // ── HELPERS ──
  function extractPath(input){
    input=(input||"").trim(); if(!input) return "";
    try { if(!input.startsWith("http")) input="https://x.com"+(input.startsWith("/")?"":"/")+input; return new URL(input).pathname; } catch { return input; }
  }
  function sinceDate(days){ const d=new Date(); d.setDate(d.getDate()-parseInt(days)); return d.toISOString(); }
  async function sbGet(table, filters){
    const c=cfg(); const params=new URLSearchParams({select:"*",...filters});
    const r=await fetch(`${c.url}/rest/v1/${table}?${params}`,{headers:{apikey:c.key,Authorization:`Bearer ${c.key}`}});
    if(!r.ok) throw new Error("Database fout ("+r.status+")");
    return r.json();
  }

  async function getProjectStats(project, days){
    const landing = extractPath(project.landing);
    const product = extractPath(project.product);
    const since = sinceDate(days);
    const [views, clicks] = await Promise.all([
      sbGet("page_views", { page:`eq.${landing}`, created_at:`gte.${since}` }),
      sbGet("click_events", { page:`eq.${landing}`, created_at:`gte.${since}` })
    ]);
    const visitors = new Set(views.map(v=>v.session_id).filter(Boolean)).size || views.length;
    // clicks on the button that goes to the product (match target), of alle clicks als geen product opgegeven
    const relevant = product
      ? clicks.filter(c => (c.target||"").includes(product))
      : clicks;
    const totalClicks = relevant.length;
    const uniqueClicks = new Set(relevant.map(c=>c.session_id).filter(Boolean)).size;

    // Bron-uitsplitsing: unieke bezoekers per bron
    const bySource = {};
    const seenSession = {};
    views.forEach(v=>{
      const src = sourceOf(v);
      const sid = v.session_id || ("x"+Math.random());
      if(!seenSession[src]) seenSession[src] = new Set();
      seenSession[src].add(sid);
    });
    Object.keys(seenSession).forEach(src=>{ bySource[src] = seenSession[src].size; });

    return { visitors, pageviews: views.length, totalClicks, uniqueClicks,
      rate: visitors ? Math.round(uniqueClicks/visitors*100) : 0, bySource };
  }

  // Bepaal de bron van een bezoek uit URL-parameters + referrer
  function sourceOf(v){
    const url = (v.url||"").toLowerCase();
    const ref = (v.referrer||"").toLowerCase();
    let qs = "";
    try { qs = new URL(v.url).search.toLowerCase(); } catch {}
    let utm = ""; try { utm = new URLSearchParams(qs).get("utm_source")||""; } catch {}

    if(/fbclid/.test(qs) || /face|fb|meta/.test(utm)) return "Facebook";
    if(/igshid/.test(qs) || /insta|^ig$/.test(utm)) return "Instagram";
    if(/ttclid/.test(qs) || /tiktok/.test(utm)) return "TikTok";
    if(/gclid/.test(qs) || /google/.test(utm)) return "Google";
    if(utm) return utm.charAt(0).toUpperCase()+utm.slice(1);

    if(/facebook|fbcdn|fb\.com|l\.facebook/.test(ref)) return "Facebook";
    if(/instagram/.test(ref)) return "Instagram";
    if(/tiktok/.test(ref)) return "TikTok";
    if(/google/.test(ref)) return "Google";
    if(/bing|duckduckgo|yahoo/.test(ref)) return "Zoekmachine";
    if(/gloweorganics/.test(ref)) return "Direct";
    if(!ref) return "Direct";
    try { return new URL(v.referrer).hostname.replace(/^www\./,""); } catch { return "Overig"; }
  }

  // ── RENDER ──
  function renderAll(){
    const projects = loadProjects();
    const wrap = document.getElementById("projects");
    if(!projects.length){
      wrap.innerHTML = `<div class="empty"><div class="big">📊</div><div>Nog geen projecten. Klik op <b>+ Nieuw project</b> om er een aan te maken.</div></div>`;
      return;
    }
    wrap.innerHTML = projects.map(p=>`
      <div class="project" id="proj-${p.id}">
        <div class="project-head">
          <div>
            <div class="pname">${escapeHtml(p.name)}</div>
            <div class="ppath">📄 ${escapeHtml(p.landing)}${p.product ? "<br>🔘 knop → "+escapeHtml(p.product) : ""}</div>
          </div>
          <div class="actions">
            <select class="period-sel" onchange="loadStats('${p.id}', this.value)">
              <option value="7">7 dagen</option>
              <option value="30" selected>30 dagen</option>
              <option value="90">90 dagen</option>
              <option value="3650">Alles</option>
            </select>
            <button class="icon-btn" title="Verversen" onclick="loadStats('${p.id}')">🔄</button>
            <button class="icon-btn" title="Bewerken" onclick="editProject('${p.id}')">✏️</button>
            <button class="icon-btn" title="Verwijderen" onclick="deleteProject('${p.id}')">🗑️</button>
          </div>
        </div>
        <div id="stats-${p.id}"><div class="loading">Cijfers laden…</div></div>
      </div>
    `).join("");
    projects.forEach(p=>loadStats(p.id));
  }

  async function loadStats(id, days){
    const project = loadProjects().find(p=>p.id===id);
    if(!project) return;
    if(!days){
      const sel = document.querySelector(`#proj-${id} .period-sel`);
      days = sel ? sel.value : 30;
    }
    const box = document.getElementById("stats-"+id);
    box.innerHTML = `<div class="loading">Cijfers laden…</div>`;
    try {
      const s = await getProjectStats(project, days);
      box.innerHTML = `
        <div class="stats">
          <div class="stat p"><div class="lbl">Bezoekers</div><div class="num">${s.visitors.toLocaleString("nl-NL")}</div><div class="sub">unieke mensen</div></div>
          <div class="stat g"><div class="lbl">Klikkers</div><div class="num">${s.uniqueClicks.toLocaleString("nl-NL")}</div><div class="sub">unieke mensen</div></div>
          <div class="stat k"><div class="lbl">Totaal klikken</div><div class="num">${s.totalClicks.toLocaleString("nl-NL")}</div><div class="sub">incl. meerdere keren</div></div>
          <div class="stat b"><div class="lbl">Click rate</div><div class="num">${s.rate}%</div><div class="sub">klikte op de knop</div></div>
        </div>
        ${renderSources(s.bySource)}`;
    } catch(e){
      box.innerHTML = `<div class="loading" style="color:#fca5a5">${e.message}</div>`;
    }
  }

  function renderSources(bySource){
    const entries = Object.entries(bySource||{}).sort((a,b)=>b[1]-a[1]);
    if(!entries.length) return "";
    const icons = { Facebook:"📘", Instagram:"📸", TikTok:"🎵", Google:"🔍", Direct:"🔗", Zoekmachine:"🔍", Overig:"🌐" };
    return `<div class="sources">
      <div class="src-title">Waar komen bezoekers vandaan?</div>
      <div class="src-list">${
        entries.map(([src,n])=>`<div class="src-chip"><span>${icons[src]||"🌐"} ${escapeHtml(src)}</span><b>${n}</b></div>`).join("")
      }</div>
    </div>`;
  }

  function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  // ── SEED: Project 1 alvast klaarzetten als er nog niets is ──
  (function seed(){
    if(loadProjects().length === 0){
      saveProjects([{ id:"p_renewal", name:"Renewal",
        landing:"https://gloweorganics.com/pages/renewal",
        product:"https://gloweorganics.com/products/bakuchiol-renewal-oil" }]);
    }
  })();

  window.addEventListener("load", renderAll);
</script>
</body>
</html>
